type: prometheus
source_types: [prometheus_k8s]
# Multiple PromQL queries executed per source, results keyed by query_id
queries:
  - id: not_running
    promql_template: 'kube_pod_status_phase{phase!="Running",phase!="Succeeded"{{ namespace_filter }}}'

  - id: restarts_1h
    promql_template: 'increase(kube_pod_container_status_restarts_total{{ namespace_selector }}[1h]) > 0'

  - id: endpoints_down
    promql_template: 'kube_endpoint_address_available{{ namespace_selector }} == 0'

display:
  not_running:
    format: "list: pod name | phase | reason"
  restarts_1h:
    format: "list: pod name | restart count"
  endpoints_down:
    format: "list: service name"
  all_healthy_message: "✅ Tất cả pods đang Running, không có restart bất thường"
