apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-backend
  namespace: devops-monitor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor-backend
  template:
    metadata:
      labels:
        app: monitor-backend
    spec:
      serviceAccountName: monitor-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: your-registry/devops-monitor-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: monitor-backend-config
            - secretRef:
                name: monitor-backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: alert-data
              mountPath: /app/data
      volumes:
        - name: alert-data
          persistentVolumeClaim:
            claimName: alert-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alert-data-pvc
  namespace: devops-monitor
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
