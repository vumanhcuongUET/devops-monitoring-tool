apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-backend
  namespace: devops-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: monitor-backend-reader
rules:
  - apiGroups: ["", "apps", "events.k8s.io"]
    resources: ["pods", "deployments", "nodes", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: monitor-backend-binding
subjects:
  - kind: ServiceAccount
    name: monitor-backend
    namespace: devops-monitor
roleRef:
  kind: ClusterRole
  name: monitor-backend-reader
  apiGroup: rbac.authorization.k8s.io
