apiVersion: v1
kind: Secret
metadata:
  name: monitor-backend-secrets
  namespace: devops-monitor
type: Opaque
stringData:
  ELASTICSEARCH_USERNAME: "CHANGE_ME"
  ELASTICSEARCH_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  SLACK_WEBHOOK_URL: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  ALERT_EMAIL_FROM: ""
  ALERT_WEBHOOK_URL: ""
  # Auth — generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
  AUTH_SECRET: "CHANGE_ME_GENERATE_A_RANDOM_SECRET"
  # API_KEYS — comma-separated. Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
  API_KEYS: "CHANGE_ME_GENERATE_API_KEY"
